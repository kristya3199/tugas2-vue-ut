<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Tracking Delivery Order</title>

    <link rel="stylesheet"
          href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/vue@2"></script>

</head>

<body>

<div id="app" class="container">

    <!-- BUTTON -->

    <a href="index.html">

        <button>
            ← Kembali ke Dashboard
        </button>

    </a>

    <br><br>


    <!-- CARD -->

    <div class="card">

        <h1>
            Tracking Delivery Order (DO) - UT
        </h1>

        <p class="subtitle">
            Lacak pengiriman bahan ajar mahasiswa Universitas Terbuka
        </p>


        <!-- FORM -->

        <div class="input-box">

            <h3>
                ➕ Tambah Delivery Order
            </h3>

            <br>

            <div class="form-grid">

                <!-- NIM -->

                <div>

                    <label>NIM</label>

                    <input
                        type="text"
                        v-model="form.nim"
                        placeholder="Masukkan NIM">

                </div>


                <!-- NAMA -->

                <div>

                    <label>Nama Mahasiswa</label>

                    <input
                        type="text"
                        v-model="form.nama"
                        placeholder="Nama Mahasiswa">

                </div>


                <!-- EKSPEDISI -->

                <div>

                    <label>Ekspedisi</label>

                    <select v-model="form.ekspedisi">

                        <option value="">
                            Pilih Ekspedisi
                        </option>

                        <option
                            v-for="e in pengirimanList"
                            :key="e.kode"
                            :value="e.nama">

                            {{ e.nama }}

                        </option>

                    </select>

                </div>


                <!-- PAKET -->

                <div>

                    <label>Paket</label>

                    <select v-model="form.paket">

                        <option value="">
                            Pilih Paket
                        </option>

                        <option
                            v-for="p in paket"
                            :key="p.kode"
                            :value="p.kode">

                            {{ p.kode }}

                        </option>

                    </select>

                </div>


                <!-- TANGGAL -->

                <div>

                    <label>Tanggal Kirim</label>

                    <input
                        type="date"
                        v-model="form.tanggal">

                </div>

            </div>

            <br>

            <button @click="tambahDO">

                Tambah Delivery Order

            </button>

        </div>


        <br><br>


        <!-- TABLE -->

        <div class="table-container">

            <table>

                <tr>

                    <th>No DO</th>
                    <th>NIM</th>
                    <th>Nama</th>
                    <th>Ekspedisi</th>
                    <th>Paket</th>
                    <th>Tanggal Kirim</th>
                    <th>Total</th>

                </tr>


                <tr
                    v-for="item in deliveryOrder"
                    :key="item.noDO">

                    <td>{{ item.noDO }}</td>

                    <td>{{ item.nim }}</td>

                    <td>{{ item.nama }}</td>

                    <td>{{ item.ekspedisi }}</td>

                    <td>{{ item.paket }}</td>

                    <td>{{ item.tanggal }}</td>

                    <td>Rp {{ item.total }}</td>

                </tr>

            </table>

        </div>

    </div>

</div>


<script src="js/dataBahanAjar.js"></script>
<script src="js/tracking-app.js"></script>

</body>
</html>
